<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up for KMA Meet</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="body-container">
        <h1><span>KMA</span> Meet</h1>

        <div class="form-container">
            <h3>Create a new account</h3>
            <h6>It's quick and easy.</h6>

            <form id="form">
                <input type="text" id="id" placeholder="Employee's id...">
                <input type="text" id="username" placeholder="Username...">
                <input type="password" id="password" placeholder="Password...">
                <input type="password" id="repeatPassword" placeholder="Repeat password">

                <button onclick="signUp()">Sign up</button>
            </form>
            <a href="/src/login/login.html">Already have an account</a>
        </div>
    </div>

    <script src="signup.js"></script>
</body>

</html>
